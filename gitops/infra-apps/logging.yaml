apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: logging
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://helm.elastic.co
    chart: elasticsearch
    targetRevision: 8.13.4
    helm:
      valueFiles:
      - values/logging-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
