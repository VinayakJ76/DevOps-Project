apiVersion: v1
kind: Service

metadata:
  name: {{ include "task-tracker-app.fullname" . }}
  labels:
    {{- include "task-tracker-app.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

  selector:
    app: {{ include "task-tracker-app.name" . }}