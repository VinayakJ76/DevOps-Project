# Cert-Manager CRDs
# These CRDs allow Kubernetes to create Certificate, Issuer, and ClusterIssuer resources
# Required for automatic TLS provisioning via Let's Encrypt

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io

spec:
  group: cert-manager.io

  names:
    kind: Certificate
    plural: certificates
    singular: certificate

  scope: Namespaced

  versions:
  - name: v1
    served: true
    storage: true

    schema:
      openAPIV3Schema:
        type: object
