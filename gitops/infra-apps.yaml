apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: infra-apps
  namespace: argocd

spec:
  project: default

  source:
    repoURL: "https://github.com/VinayakJ76/DevOps-Project.git"
    targetRevision: HEAD
    path: gitops/infra-apps

  destination:
    server: https://kubernetes.default.svc
    namespace: infra-apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
